<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartographie QA — RED</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F4F2;--surface:#FFFFFF;--border:#E4E4E0;--border2:#EFEFEC;
  --text:#1A1A1A;--text2:#666;--text3:#AAA;
  --blue:#185FA5;--green:#2D6A0A;--green-bg:#EBF4DE;
  --p0:#A32D2D;--p0bg:#FCEBEB;--p0bd:#E8AAAA;
  --p1:#6B3A00;--p1bg:#FDF0DC;--p1bd:#F0CC88;
  --p2:#1A5C1A;--p2bg:#E8F5E8;--p2bd:#88CC88;
  --p3:#0C447C;--p3bg:#E5F0FB;--p3bd:#88AADD;
  --p4:#555;--p4bg:#F0EFEC;--p4bd:#CCCCCC;
  --ad:#777;--adbg:#F7F7F5;--adbd:#DDDDDD;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--text);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:14px;font-weight:600;letter-spacing:-.2px}
.header-badge{font-size:10px;background:#333;color:#999;padding:2px 8px;border-radius:10px;font-weight:500}
.header-btns{display:flex;gap:6px}
.hbtn{padding:5px 12px;border-radius:5px;border:1px solid #444;background:transparent;color:#CCC;cursor:pointer;font-size:11px;font-weight:500;transition:all .12s}
.hbtn:hover{background:#333;color:#fff;border-color:#666}
.hbtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.hbtn.primary:hover{background:#0d4a8a}

/* ── KPI BAR ── */
.kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0}
.kpi{padding:12px 28px 12px 0;display:flex;align-items:baseline;gap:8px;border-right:1px solid var(--border2);margin-right:28px}
.kpi:last-child{border-right:none;margin-right:0}
.kpi-n{font-size:22px;font-weight:700;letter-spacing:-.5px}
.kpi-l{font-size:11px;color:var(--text2);font-weight:500}

/* ── TOOLBAR ── */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100}
.toolbar input,.toolbar select{padding:5px 10px;border-radius:5px;border:1px solid var(--border);font-size:12px;background:#fff;outline:none;color:var(--text)}
.toolbar input{min-width:200px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.1)}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.rc{font-size:11px;color:var(--text3);margin-left:4px}
.legend{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── CONTENT ── */
.content{padding:16px 24px;max-width:1800px;margin:0 auto}

/* ── GROUP ── */
.grp{background:var(--surface);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.grp-h{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;transition:background .1s}
.grp-h:hover{background:#FAFAF8}
.grp-accent{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.grp-info{flex:1;min-width:0}
.grp-name{font-size:14px;font-weight:600}
.grp-desc{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-pills{display:flex;gap:5px;align-items:center;flex-shrink:0}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pill-t{background:#F0F0EE;color:#555}
.pill-a{background:var(--green-bg);color:var(--green)}
.pill-m{background:#FDF0DC;color:var(--p1)}
.grp-chev{font-size:14px;color:var(--text3);transition:transform .15s;flex-shrink:0;line-height:1}
.grp-chev.open{transform:rotate(180deg)}
.grp-prog{display:none}
.grp-prog-fill{display:none}
.grp-body{display:none;border-top:1px solid var(--border2)}
.grp-body.open{display:block}

/* ── SUB ── */
.sub{border-bottom:1px solid var(--border2)}
.sub:last-child{border-bottom:none}
.sub-h{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 28px;cursor:pointer;background:#FAFAF8;user-select:none;transition:background .1s}
.sub-h:hover{background:#F5F5F2}
.sub-icon{font-size:11px;flex-shrink:0}
.sub-name{font-size:12px;font-weight:500;color:#333;flex:1}
.sub-meta{font-size:11px;color:var(--text3)}
.sub-chev{font-size:12px;color:var(--text3);transition:transform .15s}
.sub-chev.open{transform:rotate(180deg)}
.sub-body{display:none}
.sub-body.open{display:block}

/* ── PRIO GRID ── */
.pcols{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));border-top:1px solid var(--border2)}
.pcol{border-right:1px solid var(--border2);min-height:48px}
.pcol:last-child{border-right:none}
.pcol.hidden{display:none}
.ph{padding:5px 8px;font-size:10px;font-weight:700;text-align:center;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:4px}
.ph0{background:var(--p0bg);color:var(--p0)}
.ph1{background:var(--p1bg);color:var(--p1)}
.ph2{background:var(--p2bg);color:var(--p2)}
.ph3{background:var(--p3bg);color:var(--p3)}
.ph4{background:var(--p4bg);color:var(--p4)}
.phad{background:var(--adbg);color:var(--ad)}
.ph-count{font-size:9px;opacity:.7;font-weight:400}
.tc{padding:6px;position:relative}

/* ── TICKET ── */
.tk{background:#FFF;border:1px solid var(--border);border-radius:5px;padding:6px 8px;margin-bottom:4px;display:flex;gap:6px;align-items:flex-start;cursor:default;transition:border-color .1s;position:relative}
.tk:last-child{margin-bottom:0}
.tk:hover{border-color:#BBBBBB}
.tk:hover .tk-actions{opacity:1}
.tk-bar{width:3px;min-height:32px;border-radius:1px;flex-shrink:0;align-self:stretch}
.tk-auto{background:var(--green)}
.tk-man{background:#DDDDD8}
.tk-body{flex:1;min-width:0}
.tk-top{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap}
.tk-key{font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;cursor:pointer}
.tk-key:hover{text-decoration:underline}
.tk-auto-badge{font-size:9px;background:var(--green-bg);color:var(--green);padding:1px 5px;border-radius:3px;font-weight:600}
.tk-man-badge{font-size:9px;background:#F0F0EE;color:#888;padding:1px 5px;border-radius:3px;font-weight:600;cursor:pointer}
.tk-man-badge:hover{background:#E0E0DC}
.tk-title{font-size:11px;color:#444;line-height:1.4;word-break:break-word}
.tk-actions{opacity:0;display:flex;gap:3px;flex-shrink:0;transition:opacity .1s;align-self:flex-start;margin-top:1px}
.tk-btn{padding:2px 5px;border-radius:3px;border:1px solid var(--border);background:#FFF;cursor:pointer;font-size:10px;color:var(--text2);transition:all .1s}
.tk-btn:hover{background:#F0F0EE;border-color:#AAA}
.tk-btn.del{color:#C03030}
.tk-btn.del:hover{background:#FCEBEB;border-color:#E8AAAA}

/* ── PRIO PICKER (dropdown) ── */
.prio-pick{position:relative;display:inline-block}
.prio-pick-btn{padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:#FFF;cursor:pointer;font-size:10px;font-weight:600;color:var(--text2);transition:all .1s}
.prio-pick-btn:hover{border-color:#AAA;background:#F5F5F2}
.prio-drop{display:none;position:absolute;top:100%;left:0;z-index:500;background:#FFF;border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:110px;padding:4px;margin-top:2px}
.prio-drop.open{display:block}
.prio-opt{padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;transition:background .08s;display:flex;align-items:center;gap:6px}
.prio-opt:hover{background:#F5F5F2}
.prio-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── ADD TICKET ── */
.add-ticket-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 8px;border-radius:4px;border:1px dashed var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);width:100%;margin-top:4px;transition:all .1s}
.add-ticket-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(24,95,165,.04)}
.add-form{background:#F7F7F5;border:1px solid var(--border);border-radius:5px;padding:8px;margin-top:4px;display:none}
.add-form.open{display:block}
.add-form input{width:100%;padding:5px 8px;border-radius:4px;border:1px solid var(--border);font-size:12px;margin-bottom:6px;outline:none}
.add-form input:focus{border-color:var(--blue)}
.add-form-row{display:flex;gap:6px}
.add-form select{flex:1;padding:5px 8px;border-radius:4px;border:1px solid var(--border);font-size:12px;outline:none}
.add-form-btns{display:flex;gap:5px;margin-top:6px}
.abtn{padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:#FFF;cursor:pointer;font-size:11px;font-weight:500;transition:all .1s}
.abtn.confirm{background:var(--blue);border-color:var(--blue);color:#fff}
.abtn.confirm:hover{background:#0d4a8a}
.abtn.cancel:hover{background:#F0F0EE}

/* ── EMPTY ── */
.empty{padding:12px 8px;text-align:center;color:var(--text3);font-size:18px}

/* ── MORE ── */
.more-btn{padding:4px 8px;text-align:center;font-size:11px;color:var(--blue);cursor:pointer;background:#FAFAF8;border-top:1px solid var(--border2)}
.more-btn:hover{background:#F0F0EE;text-decoration:underline}

/* ── SUB JIRA LINK ── */
.sub-footer{padding:6px 16px 6px 28px;background:#FAFAF8;border-top:1px solid var(--border2);display:flex;align-items:center;gap:12px}
.jira-link{font-size:11px;color:var(--blue);text-decoration:none}
.jira-link:hover{text-decoration:underline}

/* ── ADD GROUP / SUB BUTTONS ── */
.add-sub-btn{display:flex;align-items:center;gap:5px;padding:7px 16px 7px 28px;border:none;border-top:1px dashed var(--border2);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);width:100%;text-align:left;transition:all .1s}
.add-sub-btn:hover{color:var(--blue);background:rgba(24,95,165,.04)}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#FFF;border-radius:8px;padding:20px;min-width:340px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px}
.modal label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 10px;border-radius:5px;border:1px solid var(--border);font-size:12px;margin-bottom:12px;outline:none;font-family:inherit}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--blue)}
.modal textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mbtn{padding:7px 16px;border-radius:5px;border:1px solid var(--border);background:#FFF;cursor:pointer;font-size:12px;font-weight:500;transition:all .1s}
.mbtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.mbtn.primary:hover{background:#0d4a8a}
.mbtn:not(.primary):hover{background:#F0F0EE}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:#1A1A1A;color:#fff;padding:10px 16px;border-radius:6px;font-size:12px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── DRAG OVER ── */
.pcol.drag-over .tc{background:rgba(24,95,165,.06);border-radius:4px}

/* ── RESPONSIVE ── */
@media(max-width:1000px){.pcols{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.pcols{grid-template-columns:repeat(2,1fr)}.kpi-bar{flex-wrap:wrap}.kpi{border-right:none;margin-right:0;padding-right:16px}}
@media print{.toolbar,.header-btns,.tk-actions,.add-ticket-btn,.add-sub-btn{display:none!important}.grp-body,.sub-body{display:block!important}}

/* ── HEATMAP BAR ── */
.heatmap{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:6px;gap:1px}
.hm-seg{height:100%;border-radius:1px;transition:width .3s}
.hm-p0{background:var(--p0)}
.hm-p1{background:var(--p1)}
.hm-p2{background:var(--p2)}
.hm-p3{background:var(--p3)}
.hm-p4{background:var(--p4)}
.hm-ad{background:#CCC}

/* ── RAPPORT ── */
.rapport-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.rapport-overlay.open{display:flex}
.rapport-content{background:#fff;border-radius:8px;width:100%;max-width:900px;padding:32px;margin:auto}
.rapport-content h1{font-size:20px;font-weight:700;margin-bottom:4px}
.rapport-content h2{font-size:14px;font-weight:600;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid #E4E4E0}
.rapport-meta{font-size:12px;color:#888;margin-bottom:20px}
.rapport-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.rapport-kpi{background:#F7F7F5;border-radius:6px;padding:12px;text-align:center}
.rapport-kpi-n{font-size:24px;font-weight:700}
.rapport-kpi-l{font-size:11px;color:#888;margin-top:2px}
.rapport-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.rapport-table th{background:#F0F0EE;padding:7px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.rapport-table td{padding:6px 10px;border-bottom:1px solid #F0F0EE}
.rapport-table tr:last-child td{border-bottom:none}
.rapport-ad-section{background:#FFF8E6;border:1px solid #F0CC88;border-radius:6px;padding:12px;margin-bottom:8px}
.rapport-ad-title{font-size:12px;font-weight:600;color:#6B3A00;margin-bottom:8px}
.rapport-ad-item{font-size:11px;color:#555;padding:2px 0}
.rapport-close-btn{position:sticky;bottom:16px;float:right;margin-top:16px}
@media print{
  .rapport-overlay{position:static;padding:0;background:none}
  .rapport-content{box-shadow:none;padding:16px}
  .rapport-close-btn,.hbtn{display:none!important}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">Cartographie QA — RED</div>
    <div class="header-badge">Données live Jira · statut AUTOMATED</div>
  </div>
  <div class="header-btns">
    <button class="hbtn" onclick="expandAll(true)">Tout déplier</button>
    <button class="hbtn" onclick="expandAll(false)">Tout replier</button>
    <button class="hbtn" onclick="openAddGroup()">+ Groupe</button>
    <button class="hbtn" onclick="genRapport()">📊 Rapport</button>
    <button class="hbtn primary" onclick="exportData()">Exporter JSON</button>
    <button class="hbtn" onclick="importData()">Importer JSON</button>
  </div>
</div>

<div class="kpi-bar">
  <div class="kpi"><span class="kpi-n" id="kpi-total">—</span><span class="kpi-l">Total tests actifs</span></div>
  <div class="kpi"><span class="kpi-n" style="color:var(--green)" id="kpi-auto">—</span><span class="kpi-l">Automatisés</span></div>
  <div class="kpi"><span class="kpi-n" style="color:#7A4008" id="kpi-man">—</span><span class="kpi-l">Manuels</span></div>
</div>

<div class="toolbar">
  <input type="text" id="s-text" placeholder="Rechercher RED-xxxx ou mot-clé…" oninput="render()">
  <div class="toolbar-sep"></div>
  <select id="s-prio" onchange="render()">
    <option value="">Toutes priorités</option>
    <option value="P0">P0 — Critique</option>
    <option value="P1">P1 — Important</option>
    <option value="P2">P2 — Normal</option>
    <option value="P3">P3 — Mineur</option>
    <option value="P4">P4 — Régression</option>
    <option value="AD">⚠ À définir</option>
  </select>
  <button class="hbtn" id="btn-ad" onclick="filterAD()" title="Voir tous les tickets sans priorité">⚠ À définir seulement</button>
  <select id="s-auto" onchange="render()">
    <option value="">Auto + Manuel</option>
    <option value="auto">Automatisés</option>
    <option value="man">Manuels</option>
  </select>
  <select id="s-grp" onchange="render()">
    <option value="">Tous les groupes</option>
  </select>
  <div class="toolbar-sep"></div>
  <span class="rc" id="rc"></span>
  <div class="legend">
    <div class="lg"><div class="ld" style="background:var(--green)"></div>Auto (AUTOMATED)</div>
    <div class="lg"><div class="ld" style="background:#DDDDD8;border:1px solid #CCC"></div>Manuel (Ouvert)</div>
  </div>
</div>

<div class="content" id="root"></div>

<!-- Modal Ajout Ticket -->
<div class="modal-bg" id="modal-tk">
  <div class="modal">
    <h3 id="modal-tk-title">Ajouter un ticket</h3>
    <label>Clé Jira (ex: RED-1234)</label>
    <input type="text" id="tk-key" placeholder="RED-" oninput="this.value=this.value.toUpperCase()">
    <label>Titre du test</label>
    <textarea id="tk-title" placeholder="Description du test…"></textarea>
    <label>Priorité</label>
    <select id="tk-prio">
      <option value="P0">P0 — Critique</option>
      <option value="P1">P1 — Important</option>
      <option value="P2">P2 — Normal</option>
      <option value="P3">P3 — Mineur</option>
      <option value="P4">P4 — Régression</option>
      <option value="AD" selected>À définir</option>
    </select>
    <label>Statut automation</label>
    <select id="tk-auto">
      <option value="man">Manuel (Ouvert)</option>
      <option value="auto">Automatisé (AUTOMATED)</option>
    </select>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('modal-tk')">Annuler</button>
      <button class="mbtn primary" onclick="confirmAddTicket()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Modal Ajout Groupe -->
<div class="modal-bg" id="modal-grp">
  <div class="modal">
    <h3>Ajouter un groupe fonctionnel</h3>
    <label>Nom du groupe</label>
    <input type="text" id="grp-name" placeholder="ex: Connect — Admin">
    <label>Description</label>
    <input type="text" id="grp-desc" placeholder="Courte description…">
    <label>Couleur (hex)</label>
    <input type="color" id="grp-color" value="#185FA5" style="height:36px;padding:2px">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('modal-grp')">Annuler</button>
      <button class="mbtn primary" onclick="confirmAddGroup()">Créer</button>
    </div>
  </div>
</div>

<!-- Modal Ajout Sous-thème -->
<div class="modal-bg" id="modal-sub">
  <div class="modal">
    <h3>Ajouter un sous-thème</h3>
    <label>Nom du sous-thème</label>
    <input type="text" id="sub-name" placeholder="ex: Gestion des alertes">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('modal-sub')">Annuler</button>
      <button class="mbtn primary" onclick="confirmAddSub()">Créer</button>
    </div>
  </div>
</div>

<!-- Modal Import -->
<div class="modal-bg" id="modal-import">
  <div class="modal">
    <h3>Importer des données JSON</h3>
    <label>Colle ton JSON ici</label>
    <textarea id="import-json" style="min-height:120px;font-family:monospace;font-size:11px" placeholder='[{"id":"CONNECT_C","label":"Connect — Chargeur",...}]'></textarea>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('modal-import')">Annuler</button>
      <button class="mbtn primary" onclick="confirmImport()">Importer</button>
    </div>
  </div>
</div>


<!-- Rapport -->
<div class="rapport-overlay" id="rapport-overlay" onclick="if(event.target===this)closeRapport()">
  <div class="rapport-content" id="rapport-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let DATA=[];
let GO={},SO={};

function loadState(){
  try{
    const d=localStorage.getItem('qamap_data');
    if(d)DATA=JSON.parse(d);
    else DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));
    const o=localStorage.getItem('qamap_open');
    if(o){const p=JSON.parse(o);GO=p.g||{};SO=p.s||{};}
  }catch(e){DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));}
}

function saveState(){
  localStorage.setItem('qamap_data',JSON.stringify(DATA));
  localStorage.setItem('qamap_open',JSON.stringify({g:GO,s:SO}));
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const q=(document.getElementById('s-text').value||'').toLowerCase().trim();
  const fp=document.getElementById('s-prio').value;
  const fa=document.getElementById('s-auto').value;
  const fg=document.getElementById('s-grp').value;
  const root=document.getElementById('root');

  let totalAll=0,autoAll=0,manAll=0,matchCount=0;
  DATA.forEach(g=>{
    g.subs.forEach(sub=>{
      sub.tickets.forEach(t=>{
        totalAll++;
        if(AUTO_SET.has(t.k)||t.manualAuto==='auto')autoAll++;else manAll++;
      });
    });
  });
  document.getElementById('kpi-total').textContent=totalAll.toLocaleString('fr');
  document.getElementById('kpi-auto').textContent=autoAll.toLocaleString('fr');
  document.getElementById('kpi-man').textContent=manAll.toLocaleString('fr');

  const grps=fg?DATA.filter(g=>g.id===fg):DATA;
  let html='';

  grps.forEach(g=>{
    const open=GO[g.id];
    const gtot=g.subs.reduce((s,sub)=>s+sub.tickets.length,0);
    const gauto=g.subs.reduce((s,sub)=>s+sub.tickets.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto').length,0);
    const gP={'P0':0,'P1':0,'P2':0,'P3':0,'P4':0,'AD':0};
    g.subs.forEach(sub=>sub.tickets.forEach(t=>{gP[t.p]=(gP[t.p]||0)+1;}));
    const hmSegs=Object.entries({'P0':'hm-p0','P1':'hm-p1','P2':'hm-p2','P3':'hm-p3','P4':'hm-p4','AD':'hm-ad'})
      .filter(([p])=>gP[p]>0)
      .map(([p,cls])=>`<div class="hm-seg ${cls}" style="flex:${gP[p]}" title="${p}: ${gP[p]}"></div>`)
      .join('');
    const gadCount=gP['AD']||0;
    html+=`<div class="grp" id="grp-${g.id}">
      <div class="grp-h" onclick="toggleG('${g.id}')">
        <div class="grp-accent" style="background:${g.color}"></div>
        <div class="grp-info">
          <div class="grp-name">${g.label}</div>
          <div class="grp-desc">${g.desc}</div>
          <div class="heatmap">${hmSegs}</div>
        </div>
        <div class="grp-pills">
          <span class="pill pill-t">${gtot} tests</span>
          <span class="pill pill-a">⚙ ${gauto} auto</span>
          <span class="pill pill-m">✎ ${gtot-gauto} manuels</span>
        </div>
        <span class="grp-chev${open?' open':''}">▾</span>
      </div>

      <div class="grp-body${open?' open':''}">`;

    if(open){
      g.subs.forEach(sub=>{
        const sk=g.id+'|'+sub.id;
        const subopen=SO[sk];
        const stot=sub.tickets.length;
        const sauto=sub.tickets.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto').length;

        html+=`<div class="sub">
          <div class="sub-h" onclick="toggleS('${sk}')">
            <span class="sub-icon" style="color:${g.color}">📁</span>
            <span class="sub-name">${sub.name}</span>
            <span class="sub-meta">${stot} tests · ${sauto} auto</span>
            <span class="sub-chev${subopen?' open':''}">▾</span>
          </div>
          <div class="sub-body${subopen?' open':''}">
            <div class="pcols">`;

        PRIOS.forEach(p=>{
          let tks=sub.tickets.filter(t=>t.p===p);
          if(q)tks=tks.filter(t=>t.k.toLowerCase().includes(q)||t.s.toLowerCase().includes(q));
          if(fa==='auto')tks=tks.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto');
          if(fa==='man')tks=tks.filter(t=>!AUTO_SET.has(t.k)&&t.manualAuto!=='auto');
          const show=!fp||fp===p;
          matchCount+=tks.length;

          html+=`<div class="pcol${show?'':' hidden'}" 
            ondragover="event.preventDefault();this.classList.add('drag-over')" 
            ondragleave="this.classList.remove('drag-over')"
            ondrop="dropTicket(event,'${g.id}','${sub.id}','${p}')">
            <div class="ph ${PRIO_CSS[p]}">
              ${PRIO_LABELS[p]}<span class="ph-count">(${sub.tickets.filter(t=>t.p===p).length})</span>
            </div>
            <div class="tc">`;

          if(!tks.length){
            html+=`<div class="empty">—</div>`;
          } else {
            const shown=tks.slice(0,6);
            shown.forEach(t=>{
              const isAuto=AUTO_SET.has(t.k)||t.manualAuto==='auto';
              html+=`<div class="tk" draggable="true" 
                ondragstart="dragStart(event,'${g.id}','${sub.id}','${t.k}')"
                id="tk-${t.k}">
                <div class="tk-bar ${isAuto?'tk-auto':'tk-man'}"></div>
                <div class="tk-body">
                  <div class="tk-top">
                    <a class="tk-key" href="${JU}${t.k}" target="_blank">${t.k}</a>
                    <span class="${isAuto?'tk-auto-badge':'tk-man-badge'}" 
                      onclick="toggleAutoStatus('${g.id}','${sub.id}','${t.k}',event)"
                      title="Cliquer pour changer le statut">
                      ${isAuto?'⚙ Auto':'✎ Manuel'}
                    </span>
                    <div class="prio-pick">
                      <button class="prio-pick-btn" style="color:${PRIO_COLORS[t.p]};background:${PRIO_BG[t.p]}"
                        onclick="togglePrioPick(event,'pick-${g.id}-${sub.id}-${t.k.replace(/-/g,'_')}')">
                        ${PRIO_LABELS[t.p]} ▾
                      </button>
                      <div class="prio-drop" id="pick-${g.id}-${sub.id}-${t.k.replace(/-/g,'_')}">
                        ${PRIOS.map(op=>`<div class="prio-opt" onclick="changePrio('${g.id}','${sub.id}','${t.k}','${op}',event)">
                          <div class="prio-dot" style="background:${PRIO_BG[op]};border:1px solid ${PRIO_COLORS[op]}"></div>
                          <span style="color:${PRIO_COLORS[op]}">${PRIO_LABELS[op]}</span>
                        </div>`).join('')}
                      </div>
                    </div>
                  </div>
                  <div class="tk-title">${t.s}</div>
                </div>
                <div class="tk-actions">
                  <button class="tk-btn del" onclick="deleteTicket('${g.id}','${sub.id}','${t.k}',event)" title="Supprimer">✕</button>
                </div>
              </div>`;
            });
            if(tks.length>6)html+=`<div class="more-btn" onclick="showMore('${g.id}','${sub.id}','${p}')">+ ${tks.length-6} autres…</div>`;
          }

          html+=`<button class="add-ticket-btn" onclick="openAddTicket('${g.id}','${sub.id}','${p}')">+ Ajouter un ticket</button>`;
          html+=`</div></div>`;
        });

        const jq=encodeURIComponent(`project = RED AND issuetype = Test AND text ~ "${sub.name}"`);
        html+=`</div>
          <div class="sub-footer">
            <a class="jira-link" href="https://upply1.atlassian.net/issues/?jql=${jq}" target="_blank">🔗 Voir dans Jira Xray</a>
          </div>
        </div></div>`;
      });

      html+=`<button class="add-sub-btn" onclick="openAddSub('${g.id}')">+ Ajouter un sous-thème</button>`;
    }

    html+=`</div></div>`;
  });

  root.innerHTML=html;
  if(q||fp||fa||fg)document.getElementById('rc').textContent=`${matchCount} résultat(s)`;
  else document.getElementById('rc').textContent='';

  // Close prio drops on outside click
  document.onclick=function(e){
    if(!e.target.closest('.prio-pick'))document.querySelectorAll('.prio-drop.open').forEach(d=>d.classList.remove('open'));
  };
}

// TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleG(id){GO[id]=!GO[id];saveState();render();}
function toggleS(sk){SO[sk]=!SO[sk];saveState();render();}
function expandAll(v){
  DATA.forEach(g=>{
    GO[g.id]=v;
    g.subs.forEach(s=>{SO[g.id+'|'+s.id]=v;});
  });
  saveState();render();
}

// ═══════════════════════════════════════════════════════════
// PRIO CHANGE
// ═══════════════════════════════════════════════════════════
function togglePrioPick(e,id){
  e.stopPropagation();
  document.querySelectorAll('.prio-drop.open').forEach(d=>{if(d.id!==id)d.classList.remove('open');});
  document.getElementById(id)?.classList.toggle('open');
}

function changePrio(gid,sid,key,newP,e){
  e.stopPropagation();
  const g=DATA.find(x=>x.id===gid);
  const sub=g?.subs.find(s=>s.id===sid);
  const t=sub?.tickets.find(t=>t.k===key);
  if(t){t.p=newP;saveState();render();toast(`${key} déplacé en ${PRIO_LABELS[newP]}`);}
}

// ═══════════════════════════════════════════════════════════
// AUTO STATUS TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleAutoStatus(gid,sid,key,e){
  e.stopPropagation();
  const g=DATA.find(x=>x.id===gid);
  const sub=g?.subs.find(s=>s.id===sid);
  const t=sub?.tickets.find(t=>t.k===key);
  if(!t)return;
  if(AUTO_SET.has(t.k)){
    // ticket natif Jira — on override localement
    t.manualAuto=t.manualAuto==='man'?undefined:'man';
  } else {
    t.manualAuto=t.manualAuto==='auto'?undefined:'auto';
  }
  saveState();render();
  toast(`${key} → ${(AUTO_SET.has(t.k)&&t.manualAuto!=='man')||t.manualAuto==='auto'?'Automatisé':'Manuel'}`);
}

// ADD TICKET
// ═══════════════════════════════════════════════════════════
function openAddTicket(gid,sid,p){
  _ctx={gid,sid,p};
  document.getElementById('tk-key').value='RED-';
  document.getElementById('tk-title').value='';
  document.getElementById('tk-prio').value=p;
  document.getElementById('tk-auto').value='man';
  document.getElementById('modal-tk-title').textContent=`Ajouter un ticket — ${PRIO_LABELS[p]}`;
  openModal('modal-tk');
}

function confirmAddTicket(){
  const key=document.getElementById('tk-key').value.trim().toUpperCase();
  const title=document.getElementById('tk-title').value.trim();
  const p=document.getElementById('tk-prio').value;
  const a=document.getElementById('tk-auto').value;
  if(!key.match(/^RED-\d+$/)){alert('Clé invalide. Format : RED-1234');return;}
  if(!title){alert('Le titre est obligatoire');return;}
  const g=DATA.find(x=>x.id===_ctx.gid);
  const sub=g?.subs.find(s=>s.id===_ctx.sid);
  if(!sub)return;
  if(sub.tickets.find(t=>t.k===key)){alert('Ce ticket est déjà dans ce sous-thème');return;}
  const newT={k:key,s:title,p};
  if(a==='auto')newT.manualAuto='auto';
  sub.tickets.push(newT);
  saveState();closeModal('modal-tk');render();
  toast(`${key} ajouté`);
}

// ═══════════════════════════════════════════════════════════
// DELETE TICKET
// ═══════════════════════════════════════════════════════════
function deleteTicket(gid,sid,key,e){
  e.stopPropagation();
  if(!confirm(`Supprimer ${key} de ce sous-thème ?`))return;
  const g=DATA.find(x=>x.id===gid);
  const sub=g?.subs.find(s=>s.id===sid);
  if(!sub)return;
  sub.tickets=sub.tickets.filter(t=>t.k!==key);
  saveState();render();toast(`${key} supprimé`);
}

// ═══════════════════════════════════════════════════════════
// DRAG & DROP (déplacer entre colonnes)
// ═══════════════════════════════════════════════════════════
let _drag={};
function dragStart(e,gid,sid,key){
  _drag={gid,sid,key};
  e.dataTransfer.effectAllowed='move';
}
function dropTicket(e,toGid,toSid,toP){
  e.preventDefault();
  document.querySelectorAll('.pcol.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const {gid,sid,key}=_drag;
  if(!key)return;
  const fromG=DATA.find(x=>x.id===gid);
  const fromSub=fromG?.subs.find(s=>s.id===sid);
  const t=fromSub?.tickets.find(t=>t.k===key);
  if(!t)return;

  if(gid===toGid&&sid===toSid){
    // Même sous-thème — juste changer la prio
    t.p=toP;
    saveState();render();
    toast(`${key} → ${PRIO_LABELS[toP]}`);
  } else {
    // Déplacer vers un autre sous-thème
    fromSub.tickets=fromSub.tickets.filter(x=>x.k!==key);
    t.p=toP;
    const toG=DATA.find(x=>x.id===toGid);
    const toSub=toG?.subs.find(s=>s.id===toSid);
    if(toSub){
      toSub.tickets.push(t);
      saveState();render();
      toast(`${key} déplacé`);
    }
  }
  _drag={};
}

// RAPPORT
// ═══════════════════════════════════════════════════════════
function genRapport(){
  const date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  let totalAll=0,autoAll=0;
  DATA.forEach(g=>g.subs.forEach(s=>{
    totalAll+=s.tickets.length;
    autoAll+=s.tickets.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto').length;
  }));
  
  let html=`<button class="hbtn rapport-close-btn" onclick="closeRapport()">✕ Fermer</button>
    <h1>Cartographie QA — Bibliothèque de tests RED</h1>
    <div class="rapport-meta">Généré le ${date} · Données live Jira · Statut AUTOMATED</div>
    <div class="rapport-kpis">
      <div class="rapport-kpi"><div class="rapport-kpi-n">${totalAll}</div><div class="rapport-kpi-l">Total tests actifs</div></div>
      <div class="rapport-kpi"><div class="rapport-kpi-n" style="color:var(--green)">${autoAll}</div><div class="rapport-kpi-l">Automatisés</div></div>
      <div class="rapport-kpi"><div class="rapport-kpi-n" style="color:#7A4008">${totalAll-autoAll}</div><div class="rapport-kpi-l">Manuels</div></div>
    </div>
    <h2>Répartition par groupe fonctionnel</h2>
    <table class="rapport-table">
      <thead><tr>
        <th>Groupe</th><th>Total</th><th>Auto</th><th>Manuel</th>
        <th style="color:var(--p0)">P0</th>
        <th style="color:var(--p1)">P1</th>
        <th style="color:var(--p2)">P2</th>
        <th style="color:var(--p3)">P3</th>
        <th style="color:var(--p4)">P4</th>
        <th style="color:#888">À définir</th>
      </tr></thead><tbody>`;
  
  const adGroups=[];
  DATA.forEach(g=>{
    const tks=g.subs.flatMap(s=>s.tickets);
    const tot=tks.length;
    const auto=tks.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto').length;
    const p={P0:0,P1:0,P2:0,P3:0,P4:0,AD:0};
    tks.forEach(t=>{p[t.p]=(p[t.p]||0)+1;});
    html+=`<tr>
      <td><strong>${g.label}</strong></td>
      <td>${tot}</td><td style="color:var(--green)">${auto}</td><td>${tot-auto}</td>
      <td style="color:var(--p0);font-weight:${p.P0?'600':'400'}">${p.P0||'—'}</td>
      <td style="color:var(--p1);font-weight:${p.P1?'600':'400'}">${p.P1||'—'}</td>
      <td style="color:var(--p2);font-weight:${p.P2?'600':'400'}">${p.P2||'—'}</td>
      <td style="color:var(--p3);font-weight:${p.P3?'600':'400'}">${p.P3||'—'}</td>
      <td style="color:var(--p4);font-weight:${p.P4?'600':'400'}">${p.P4||'—'}</td>
      <td style="color:#B45309;font-weight:${p.AD?'600':'400'}">${p.AD||'—'}</td>
    </tr>`;
    if(p.AD>0) adGroups.push({g,tks:tks.filter(t=>t.p==='AD')});
  });
  html+=`</tbody></table>`;

  // Section tests automatisés
  html+=`<h2>⚙ Tests automatisés (${autoAll} au total)</h2>`;
  DATA.forEach(g=>{
    const autoTks=g.subs.flatMap(s=>s.tickets.filter(t=>AUTO_SET.has(t.k)||t.manualAuto==='auto'));
    if(!autoTks.length) return;
    html+=`<div class="rapport-ad-section" style="background:#EBF4DE;border-color:#88CC88">
      <div class="rapport-ad-title" style="color:var(--green)">${g.label} — ${autoTks.length} test(s) automatisé(s)</div>
      ${autoTks.map(t=>`<div class="rapport-ad-item"><a href="https://upply1.atlassian.net/browse/${t.k}" target="_blank" style="color:var(--blue);font-weight:600">${t.k}</a> — ${t.s}</div>`).join('')}
    </div>`;
  });
  
  html+=`<div style="text-align:right;margin-top:24px">
    <button class="hbtn" onclick="window.print()">🖨 Imprimer / Exporter PDF</button>
    <button class="hbtn" onclick="closeRapport()" style="margin-left:8px">Fermer</button>
  </div>`;
  
  document.getElementById('rapport-body').innerHTML=html;
  document.getElementById('rapport-overlay').classList.add('open');
}

function closeRapport(){
  document.getElementById('rapport-overlay').classList.remove('open');
}
